<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kék Cica Szeretet Widget</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kék Cica">

    <style>
        :root {
            --bg-color: #f0f4f8;
            --widget-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .widget-container {
            width: 320px;
            height: 320px;
            background-color: var(--widget-bg);
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 24px;
            box-sizing: border-box;
            position: relative;
        }

        .cica-box {
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .cica-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.2s ease;
        }

        .cica-box:hover .cica-img {
            transform: scale(1.05);
        }
        
        .cica-box:active .cica-img {
            transform: scale(0.95);
        }

        .float-animation {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        .pop-animation {
            animation: pop 0.25s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .status-text {
            font-size: 15px;
            font-weight: 600;
            color: #486581;
            text-align: center;
            margin: 6px 0;
            height: 20px;
        }

        .button-row {
            display: flex;
            gap: 20px;
        }

        .btn {
            border: none;
            border-radius: 50%;
            width: 54px;
            height: 54px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            outline: none;
            transition: transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.9);
        }

        .heart-button {
            background: #ff4a7a;
            color: white;
            box-shadow: 0 4px 12px rgba(255, 74, 122, 0.25);
        }

        .sad-button {
            background: #4a90e2;
            color: white;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.25);
        }

        .floating-heart {
            position: absolute;
            color: #ff4a7a;
            font-size: 20px;
            pointer-events: none;
            animation: flyUp 0.8s ease-out forwards;
            z-index: 10;
        }

        @keyframes flyUp {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--x), -70px) scale(1.3); }
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="cica-box" id="cicaBox">
            <img src="" id="cicaImage" class="cica-img float-animation" alt="Cica">
        </div>

        <div class="status-text" id="statusText">Betöltés...</div>

        <div class="button-row">
            <button class="btn sad-button" id="sadBtn">😢</button>
            <button class="btn heart-button" id="heartBtn">❤️</button>
        </div>
    </div>

    <script>
        // Pontosan a te mappádban lévő nevek:
        const szomoruKepek = ["szomoru_shy1.png", "szomoru_shy2.png", "szomoru_takaro.png"];
        const boldogKepek = [
            "boldog_sziv_mogott.png", "boldog_sziv_tart.png", "boldog_puszi.png", 
            "boldog_oleles2.png", "boldog_oleles1.png", "boldog_sziv_olel.png", 
            "boldog_virag_par.png", "boldog_virag.png"
        ];

        const szomoruSzovegek = ["Szeretetre vágyom... 🥺", "Picit egyedül érzem magam.. 👉👈", "Bújj oda hozzám! 🥱"];
        const boldogSzovegek = ["Imádlak! 🥰", "Juhúú, ez az! 💖", "Dorombolááás~ 🐾", "Köszii! Miau! ✨", "Ez nagyon jóóó! 😻"];

        const cicaImage = document.getElementById('cicaImage');
        const cicaBox = document.getElementById('cicaBox');
        const statusText = document.getElementById('statusText');
        const heartBtn = document.getElementById('heartBtn');
        const sadBtn = document.getElementById('sadBtn');

        let cicaKattintasok = 0;
        let mostBoldog = false;
        let idozito;

        function randomElem(tomb) {
            return tomb[Math.floor(Math.random() * tomb.length)];
        }

        function inditElszomorodoIdozito() {
            clearTimeout(idozito);
            idozito = setTimeout(() => {
                if (mostBoldog) {
                    cicaSzomoruraValt();
                }
            }, 3600000); // 1 óra
        }

        function cicaSzomoruraValt() {
            clearTimeout(idozito);
            mostBoldog = false;
            cicaKattintasok = 0;
            cicaImage.src = randomElem(szomoruKepek);
            statusText.innerText = randomElem(szomoruSzovegek);
            cicaImage.classList.add('float-animation');
        }

        function cicaBoldograValt(szoveg) {
            mostBoldog = true;
            cicaKattintasok = 0;
            
            let ujKep = randomElem(boldogKepek);
            if (cicaImage.src.includes(ujKep) && boldogKepek.length > 1) {
                ujKep = boldogKepek.find(k => !cicaImage.src.includes(k)) || ujKep;
            }
            
            cicaImage.src = ujKep;
            statusText.innerText = szoveg;
            
            inditElszomorodoIdozito();
        }

        function ugrasAnimacio() {
            cicaImage.classList.remove('float-animation');
            cicaImage.classList.add('pop-animation');
            setTimeout(() => {
                cicaImage.classList.remove('pop-animation');
                cicaImage.classList.add('float-animation');
            }, 250);
        }

        cicaBox.addEventListener('click', (e) => {
            cicaKattintasok++;
            ugrasAnimacio();

            if (!mostBoldog) {
                if (cicaKattintasok === 1) {
                    statusText.innerText = "Ez jólesett... picit még! 😊";
                } else if (cicaKattintasok === 2) {
                    statusText.innerText = "Már majdnem... egy utolsót! ⚡";
                } else if (cicaKattintasok >= 3) {
                    createFloatingHeart(e);
                    cicaBoldograValt(randomElem(boldogSzovegek));
                }
            } 
            else {
                inditElszomorodoIdozito();
                
                if (cicaKattintasok === 1) {
                    statusText.innerText = "Úgy szeretem, ha simogatsz! 🥰";
                } else if (cicaKattintasok === 2) {
                    statusText.innerText = "Mi lesz a következő formám? 🐾";
                } else if (cicaKattintasok >= 3) {
                    createFloatingHeart(e);
                    cicaBoldograValt("Átváltozááás! " + randomElem(boldogSzovegek));
                }
            }
        });

        heartBtn.addEventListener('click', (e) => {
            ugrasAnimacio();
            for (let i = 0; i < 4; i++) {
                setTimeout(() => createFloatingHeart(e), i * 100);
            }
            cicaBoldograValt("AZONNALI SZERETET-ROHAM! ❤️🔥");
        });

        sadBtn.addEventListener('click', () => {
            ugrasAnimacio();
            cicaSzomoruraValt();
        });

        function createFloatingHeart(e) {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerText = '❤️';
            
            const randomX = (Math.random() - 0.5) * 80;
            heart.style.setProperty('--x', `${randomX}px`);
            
            heart.style.left = `calc(50% - 10px)`;
            heart.style.top = `40%`;

            cicaBox.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 800);
        }

        cicaSzomoruraValt();
    </script>
</body>
</html>
